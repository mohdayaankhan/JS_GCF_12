<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    transition: 0.3s;
}

.light {
    background: white;
    color: black;
}

header {
    text-align: center;
    padding: 40px;
}

nav {
    display: flex;
    justify-content: center;
    background: #333;
}

nav a {
    padding: 15px;
    color: white;
    text-decoration: none;
}

nav a.active {
    background: orange;
}

section {
    padding: 40px;
    text-align: center;
    opacity: 1;
    transform: translateY(0);
    transition: 0.5s;
}

.hidden {
    opacity: 0;
    transform: translateY(50px);
}

.card {
    background: #222;
    margin: 10px;
    padding: 20px;
    display: inline-block;
}
</style>

</head>
<body>

<header>
    <h1>Mohd ayaan khan</h1>
    <p id="typing"></p>
    <button onclick="toggleTheme()">Toggle Theme</button>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
</nav>

<section id="about" class="hidden">
    <h2>About</h2>
    <p>AIML student learning coding.</p>
</section>

<section id="skills" class="hidden">
    <h2>Skills</h2>
    <ul>
        <li>Python</li>
        <li>JavaScript</li>
        <li>ML</li>
    </ul>
</section>

<section id="projects" class="hidden">
    <h2>Projects</h2>

    <button onclick="filterProjects('all')">All</button>
    <button onclick="filterProjects('web')">Web</button>
    <button onclick="filterProjects('ml')">ML</button>

    <div class="card web">Website</div>
    <div class="card ml">ML Model</div>
    <div class="card web">Portfolio</div>
</section>

<script>
const roles = ["AIML Student", "Web Developer", "Future Engineer"];
let i = 0, j = 0;
let current = "", deleting = false;

function typingEffect() {
    current = roles[i];
    let display = document.getElementById("typing");

    if (!deleting) {
        display.textContent = current.substring(0, j++);
    } else {
        display.textContent = current.substring(0, j--);
    }

    if (!deleting && j === current.length) {
        deleting = true;
        setTimeout(typingEffect, 1000);
        return;
    }

    if (deleting && j === 0) {
        deleting = false;
        i = (i + 1) % roles.length;
    }

    setTimeout(typingEffect, deleting ? 50 : 100);
}
typingEffect();

function toggleTheme() {
    document.body.classList.toggle("light");
}

function filterProjects(type) {
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        if (type === "all" || card.classList.contains(type)) {
            card.style.display = "inline-block";
        } else {
            card.style.display = "none";
        }
    });
}

window.addEventListener("scroll", () => {
    let sections = document.querySelectorAll("section");
    let navLinks = document.querySelectorAll("nav a");

    sections.forEach((sec, index) => {
        let top = window.scrollY;
        let offset = sec.offsetTop - 200;
        let height = sec.offsetHeight;

        if (top >= offset && top < offset + height) {
            navLinks.forEach(link => link.classList.remove("active"));
            navLinks[index].classList.add("active");
        }

        if (top > offset) {
            sec.classList.remove("hidden");
        }
    });
});

document.querySelectorAll("nav a").forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute("href")).scrollIntoView({
            behavior: "smooth"
        });
    });
});
</script>

</body>
</html>
